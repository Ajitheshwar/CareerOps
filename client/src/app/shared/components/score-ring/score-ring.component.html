<div class="score-ring-wrapper" style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
  <div class="progress-ring-container">
    <svg width="64" height="64" class="progress-svg">
      <circle class="circle-bg" cx="32" cy="32" r="26" />
      <circle 
        class="circle-fg" 
        [ngClass]="getScoreColorClass(score)"
        cx="32" 
        cy="32" 
        r="26" 
        [style.strokeDashoffset]="calculateOffset(score)"
      />
    </svg>
    <span class="progress-ring-text" [ngClass]="getScoreColorClass(score)">
      {{ score !== null && score !== undefined ? score + '%' : '--' }}
    </span>
  </div>
  @if (score === null || score === undefined) {
    <button 
      class="btn-rerun"
      (click)="onReRunClick($event)"
      [disabled]="isAnalyzing"
      title="Re-run analysis for this job"
    >
      {{ isAnalyzing ? '⏳ Analyzing...' : '🔄 Re-run' }}
    </button>
  }
</div>
