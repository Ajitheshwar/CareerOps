<div class="coach-wrapper fade-in">
  <div class="coach-header">
    <h2>Interview Training Coach</h2>
    <p>Practice role-specific questions generated based on your resume and target requirements.</p>
  </div>

  @if (!job()) {
    <app-empty-state 
      title="No job selected" 
      message="Go to the Matches tab, expand a job card, and click 'Tailor Materials' to trigger the Interview Prep Agent." 
      icon="chat"
    ></app-empty-state>
  } @else if (status() === 'preparing') {
    <app-agent-loader
      title="Agent is generating interview questions..."
      [description]="'Preparing technical and behavioral practice guides for <strong>' + job()?.company + '</strong>.'"
    ></app-agent-loader>
  } @else if (!prepData()) {
    <app-empty-state 
      title="Prep guides required" 
      message="Click 'Tailor Materials' on the Matches dashboard to schedule coaching items." 
      icon="chat"
    ></app-empty-state>
  } @else {
    <app-interview-coach-practice 
      [jobId]="job()!.id" 
      [questions]="questions()"
    ></app-interview-coach-practice>
  }
</div>
