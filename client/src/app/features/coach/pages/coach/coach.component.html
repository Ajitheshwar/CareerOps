<div class="coach-wrapper fade-in">
  <div class="coach-header">
    <h2>Interview Training Coach</h2>
    <p>Adaptive AI interview practice tailored strictly to your resume profile.</p>
  </div>

  <div *ngIf="isLoading()" class="loader-wrapper text-center font-main py-48" style="display: flex; flex-direction: column; align-items: center; gap: 16px; margin-top: 40px;">
    <div class="loader-circle" style="width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--accent-purple); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <h4>Initializing Interview Coach...</h4>
    <p style="color: var(--text-muted);">Assembling candidate resume and preparing adaptive rounds...</p>
  </div>

  <div *ngIf="!isLoading()" style="margin-top: 24px;">
    <app-interview-prep-dashboard
      [readiness]="readiness()"
      [sessions]="sessions()"
      [details]="genericJobDetails"
    ></app-interview-prep-dashboard>
  </div>
</div>
